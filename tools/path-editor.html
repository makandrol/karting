<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Редактор SVG шляху для треків</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    button:hover { background: #444; }
    select { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    .canvas-wrap { position: relative; cursor: crosshair; width: 100%; }
    .canvas-wrap img { display: block; width: 100%; height: auto; border-radius: 8px; }
    .canvas-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .output { margin-top: 16px; }
    textarea { width: 100%; height: 120px; background: #222; color: #4ade80; border: 1px solid #444; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
    .hint { color: #888; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .hint code { background: #333; padding: 2px 6px; border-radius: 4px; }
    .stats { color: #aaa; font-size: 13px; margin-left: auto; }
  </style>
</head>
<body>
  <h1>🏎️ Редактор SVG шляху для треків</h1>
  <p class="hint">
    Клікай по трасі послідовно — починай від фінішної лінії, йди по напрямку руху (за годинниковою), і замкни контур.<br>
    Достатньо 20-30 точок. Результат копіюй в <code>src/data/tracks.ts</code> → поле <code>svgPath</code>.
  </p>

  <div class="controls">
    <label>Трек:
      <select id="trackSelect"></select>
    </label>
    <button onclick="undo()">↩ Undo</button>
    <button onclick="clearPoints()">🗑 Очистити</button>
    <button onclick="closePath()">⭕ Замкнути</button>
    <button onclick="copyPath()">📋 Копіювати</button>
    <span class="stats" id="stats">Точок: 0</span>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <img id="trackImg" src="" alt="Track" crossorigin="anonymous">
    <svg id="overlaySvg" preserveAspectRatio="none">
      <path id="svgPath" fill="none" stroke="#e52d1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
      <g id="pointsGroup"></g>
    </svg>
  </div>

  <div class="output">
    <label style="font-size:13px;color:#aaa;">SVG Path (копіюй це в tracks.ts → svgPath):</label>
    <textarea id="pathOutput" readonly></textarea>
  </div>

  <script>
    const TRACKS = [];
    for (let i = 1; i <= 11; i++) {
      TRACKS.push({
        id: i,
        name: `Конфігурація №${i}`,
        image: `../public/tracks/nfs_${String(i).padStart(2, '0')}.jpg`,
      });
    }

    let imgNaturalW = 1280;
    let imgNaturalH = 800;

    let points = [];
    let isClosed = false;

    const trackSelect = document.getElementById('trackSelect');
    const trackImg = document.getElementById('trackImg');
    const overlaySvg = document.getElementById('overlaySvg');
    const svgPathEl = document.getElementById('svgPath');
    const pointsGroup = document.getElementById('pointsGroup');
    const pathOutput = document.getElementById('pathOutput');
    const statsEl = document.getElementById('stats');
    const canvasWrap = document.getElementById('canvasWrap');

    // Populate select
    TRACKS.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      trackSelect.appendChild(opt);
    });

    function updateViewBox() {
      overlaySvg.setAttribute('viewBox', `0 0 ${imgNaturalW} ${imgNaturalH}`);
    }

    trackImg.addEventListener('load', () => {
      imgNaturalW = trackImg.naturalWidth;
      imgNaturalH = trackImg.naturalHeight;
      updateViewBox();
      render();
    });

    // Load saved points from localStorage
    function loadSaved() {
      try {
        const saved = localStorage.getItem(`track_path_v2_${trackSelect.value}`);
        if (saved) {
          const data = JSON.parse(saved);
          points = data.points || [];
          isClosed = data.isClosed || false;
        } else {
          points = [];
          isClosed = false;
        }
      } catch {
        points = [];
        isClosed = false;
      }
    }

    function saveCurrent() {
      localStorage.setItem(`track_path_v2_${trackSelect.value}`, JSON.stringify({ points, isClosed }));
    }

    trackSelect.addEventListener('change', () => {
      const t = TRACKS.find(x => x.id === parseInt(trackSelect.value));
      trackImg.src = t.image;
      loadSaved();
      render();
    });

    // Init first track
    trackImg.src = TRACKS[0].image;
    loadSaved();

    // Click handler — coordinates in image native pixels
    canvasWrap.addEventListener('click', (e) => {
      if (isClosed) return;

      const rect = trackImg.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * imgNaturalW;
      const y = ((e.clientY - rect.top) / rect.height) * imgNaturalH;

      points.push({ x: Math.round(x), y: Math.round(y) });
      saveCurrent();
      render();
    });

    function undo() {
      if (isClosed) { isClosed = false; }
      else { points.pop(); }
      saveCurrent();
      render();
    }

    function clearPoints() {
      if (!confirm('Очистити всі точки?')) return;
      points = [];
      isClosed = false;
      saveCurrent();
      render();
    }

    function closePath() {
      if (points.length >= 3) {
        isClosed = true;
        saveCurrent();
        render();
      }
    }

    function copyPath() {
      const text = pathOutput.value;
      navigator.clipboard.writeText(text).then(() => {
        pathOutput.style.borderColor = '#4ade80';
        setTimeout(() => { pathOutput.style.borderColor = '#444'; }, 1500);
      });
    }

    function buildSmoothPath(pts, closed) {
      if (pts.length === 0) return '';
      if (pts.length === 1) return `M ${pts[0].x},${pts[0].y}`;

      let d = `M ${pts[0].x},${pts[0].y}`;

      if (pts.length === 2) {
        d += ` L ${pts[1].x},${pts[1].y}`;
        return d;
      }

      // Catmull-Rom → cubic bezier
      const allPts = closed
        ? [pts[pts.length - 1], ...pts, pts[0], pts[1]]
        : [pts[0], ...pts, pts[pts.length - 1]];

      for (let i = 1; i < allPts.length - 2; i++) {
        const p0 = allPts[i - 1];
        const p1 = allPts[i];
        const p2 = allPts[i + 1];
        const p3 = allPts[i + 2];

        const tension = 0.3;
        const cp1x = p1.x + (p2.x - p0.x) * tension;
        const cp1y = p1.y + (p2.y - p0.y) * tension;
        const cp2x = p2.x - (p3.x - p1.x) * tension;
        const cp2y = p2.y - (p3.y - p1.y) * tension;

        d += ` C ${Math.round(cp1x)},${Math.round(cp1y)} ${Math.round(cp2x)},${Math.round(cp2y)} ${p2.x},${p2.y}`;
      }

      if (closed) d += ' Z';

      return d;
    }

    function render() {
      const d = buildSmoothPath(points, isClosed);
      svgPathEl.setAttribute('d', d);
      pathOutput.value = d;
      statsEl.textContent = `Точок: ${points.length}${isClosed ? ' (замкнуто)' : ''}`;

      // Render point dots
      pointsGroup.innerHTML = '';
      
      // Dot size relative to image
      const dotR = Math.max(imgNaturalW / 200, 4);
      const startR = dotR * 1.5;
      const fontSize = Math.max(imgNaturalW / 100, 10);

      points.forEach((p, i) => {
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', p.x);
        circle.setAttribute('cy', p.y);
        circle.setAttribute('r', i === 0 ? startR : dotR);
        circle.setAttribute('fill', i === 0 ? '#4ade80' : '#facc15');
        circle.setAttribute('stroke', '#000');
        circle.setAttribute('stroke-width', Math.max(dotR / 3, 1));
        circle.setAttribute('opacity', '0.9');
        pointsGroup.appendChild(circle);

        // Number label
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', p.x + dotR + 4);
        text.setAttribute('y', p.y - dotR - 2);
        text.setAttribute('fill', '#ccc');
        text.setAttribute('font-size', fontSize);
        text.setAttribute('font-family', 'monospace');
        text.setAttribute('font-weight', 'bold');
        text.textContent = String(i + 1);
        pointsGroup.appendChild(text);
      });
    }

    updateViewBox();
    render();
  </script>
</body>
</html>
