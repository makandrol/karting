<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Редактор SVG шляху для треків</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    .controls { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    button:hover { background: #444; }
    select { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    .canvas-wrap { position: relative; cursor: crosshair; width: 100%; }
    .canvas-wrap img { display: block; width: 100%; height: auto; border-radius: 8px; }
    .canvas-wrap svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    .output { margin-top: 16px; }
    textarea { width: 100%; height: 120px; background: #222; color: #4ade80; border: 1px solid #444; border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: vertical; }
    .hint { color: #888; font-size: 12px; margin-bottom: 12px; line-height: 1.5; }
    .hint code { background: #333; padding: 2px 6px; border-radius: 4px; }
    .stats { color: #aaa; font-size: 13px; margin-left: auto; }
    #debugInfo { background: #222; padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 12px; color: #f87171; margin-bottom: 10px; word-break: break-all; }
  </style>
</head>
<body>
  <h1>🏎️ Редактор SVG шляху для треків</h1>
  <p class="hint">
    Клікай по трасі послідовно — починай від фінішної лінії, йди по напрямку руху, і замкни контур.<br>
    Достатньо 20-30 точок. Результат копіюй в <code>src/data/tracks.ts</code> → поле <code>svgPath</code>.
  </p>

  <div class="controls">
    <label>Трек: <select id="trackSelect"></select></label>
    <button onclick="undo()">↩ Undo</button>
    <button onclick="clearPoints()">🗑 Очистити</button>
    <button onclick="closePath()">⭕ Замкнути</button>
    <button onclick="copyPath()">📋 Копіювати</button>
    <span class="stats" id="stats">Точок: 0</span>
  </div>

  <div id="debugInfo">Завантаження...</div>

  <div class="canvas-wrap" id="canvasWrap">
    <img id="trackImg" src="" alt="Track">
    <svg id="overlaySvg" preserveAspectRatio="none">
      <path id="svgPath" fill="none" stroke="#e52d1a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />
      <g id="pointsGroup"></g>
    </svg>
  </div>

  <div class="output">
    <label style="font-size:13px;color:#aaa;">SVG Path (копіюй це в tracks.ts → svgPath):</label>
    <textarea id="pathOutput" readonly></textarea>
  </div>

  <script>
    // ===== CONFIG =====
    const TRACK_PATHS = [
      '../public/tracks/nfs_{NUM}.jpg',
      '../tracks/nfs/nfs_{NUM}.jpg',
    ];

    // ===== DOM =====
    const debugEl    = document.getElementById('debugInfo');
    const trackSelect = document.getElementById('trackSelect');
    const trackImg   = document.getElementById('trackImg');
    const overlaySvg = document.getElementById('overlaySvg');
    const svgPathEl  = document.getElementById('svgPath');
    const pointsGroup = document.getElementById('pointsGroup');
    const pathOutput = document.getElementById('pathOutput');
    const statsEl    = document.getElementById('stats');
    const canvasWrap = document.getElementById('canvasWrap');

    // ===== STATE =====
    let imgW = 1280, imgH = 720;
    let points = [];
    let isClosed = false;

    // ===== DEBUG =====
    function dbg(msg) {
      debugEl.textContent = msg;
      debugEl.style.color = '#f87171';
    }
    function dbgOk(msg) {
      debugEl.textContent = msg;
      debugEl.style.color = '#4ade80';
    }

    // ===== INIT TRACKS =====
    for (let i = 1; i <= 11; i++) {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = 'Конфігурація №' + i;
      trackSelect.appendChild(opt);
    }

    // ===== LOAD IMAGE =====
    function loadImage(trackId) {
      const num = String(trackId).padStart(2, '0');
      const candidates = TRACK_PATHS.map(p => p.replace('{NUM}', num));
      let idx = 0;

      dbg('⏳ Шукаю картинку: ' + candidates[0]);

      function tryNext() {
        if (idx >= candidates.length) {
          dbg('❌ Не знайдено. Спробовані шляхи: ' + candidates.join(' | '));
          return;
        }
        trackImg.src = candidates[idx];
        idx++;
      }

      trackImg.onload = function() {
        imgW = trackImg.naturalWidth || 1280;
        imgH = trackImg.naturalHeight || 720;
        overlaySvg.setAttribute('viewBox', '0 0 ' + imgW + ' ' + imgH);
        dbgOk('✅ Завантажено: ' + trackImg.src + ' (' + imgW + '×' + imgH + ')');
        render();
      };
      trackImg.onerror = function() {
        dbg('⚠️ Не вдалось: ' + trackImg.src + (idx < candidates.length ? ' → пробую наступний...' : ''));
        tryNext();
      };

      tryNext();
    }

    // ===== LOCALSTORAGE =====
    function lsKey() { return 'track_path_v3_' + trackSelect.value; }

    function loadSaved() {
      points = [];
      isClosed = false;
      try {
        const s = localStorage.getItem(lsKey());
        if (s) { const d = JSON.parse(s); points = d.points || []; isClosed = !!d.isClosed; }
      } catch {}
    }

    function save() {
      localStorage.setItem(lsKey(), JSON.stringify({ points, isClosed }));
    }

    // ===== TRACK CHANGE =====
    trackSelect.addEventListener('change', function() {
      loadSaved();
      loadImage(parseInt(trackSelect.value));
    });

    // ===== CLICK =====
    canvasWrap.addEventListener('click', function(e) {
      if (isClosed) return;
      const rect = trackImg.getBoundingClientRect();
      const x = Math.round(((e.clientX - rect.left) / rect.width) * imgW);
      const y = Math.round(((e.clientY - rect.top) / rect.height) * imgH);
      points.push({ x, y });
      save();
      render();
    });

    // ===== ACTIONS =====
    function undo() {
      if (isClosed) { isClosed = false; } else { points.pop(); }
      save(); render();
    }

    function clearPoints() {
      if (points.length > 0 && !confirm('Очистити всі точки?')) return;
      points = []; isClosed = false; save(); render();
    }

    function closePath() {
      if (points.length >= 3) { isClosed = true; save(); render(); }
    }

    function copyPath() {
      navigator.clipboard.writeText(pathOutput.value).then(function() {
        pathOutput.style.borderColor = '#4ade80';
        setTimeout(function() { pathOutput.style.borderColor = '#444'; }, 1500);
      });
    }

    // ===== SMOOTH PATH =====
    function buildPath(pts, closed) {
      if (pts.length === 0) return '';
      if (pts.length === 1) return 'M ' + pts[0].x + ',' + pts[0].y;
      var d = 'M ' + pts[0].x + ',' + pts[0].y;
      if (pts.length === 2) return d + ' L ' + pts[1].x + ',' + pts[1].y;

      // Catmull-Rom → cubic bezier
      var all = closed
        ? [pts[pts.length - 1]].concat(pts, [pts[0], pts[1]])
        : [pts[0]].concat(pts, [pts[pts.length - 1]]);

      for (var i = 1; i < all.length - 2; i++) {
        var p0 = all[i-1], p1 = all[i], p2 = all[i+1], p3 = all[i+2];
        var t = 0.3;
        var c1x = Math.round(p1.x + (p2.x - p0.x) * t);
        var c1y = Math.round(p1.y + (p2.y - p0.y) * t);
        var c2x = Math.round(p2.x - (p3.x - p1.x) * t);
        var c2y = Math.round(p2.y - (p3.y - p1.y) * t);
        d += ' C ' + c1x + ',' + c1y + ' ' + c2x + ',' + c2y + ' ' + p2.x + ',' + p2.y;
      }
      if (closed) d += ' Z';
      return d;
    }

    // ===== RENDER =====
    function render() {
      var d = buildPath(points, isClosed);
      svgPathEl.setAttribute('d', d);
      pathOutput.value = d;
      statsEl.textContent = 'Точок: ' + points.length + (isClosed ? ' (замкнуто)' : '');

      pointsGroup.innerHTML = '';
      var r = Math.max(imgW / 200, 4);

      points.forEach(function(p, i) {
        var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        c.setAttribute('cx', p.x);
        c.setAttribute('cy', p.y);
        c.setAttribute('r', i === 0 ? r * 1.5 : r);
        c.setAttribute('fill', i === 0 ? '#4ade80' : '#facc15');
        c.setAttribute('stroke', '#000');
        c.setAttribute('stroke-width', Math.max(r / 3, 1));
        pointsGroup.appendChild(c);

        var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', p.x + r + 4);
        t.setAttribute('y', p.y - r - 2);
        t.setAttribute('fill', '#ccc');
        t.setAttribute('font-size', Math.max(imgW / 100, 10));
        t.setAttribute('font-family', 'monospace');
        t.setAttribute('font-weight', 'bold');
        t.textContent = '' + (i + 1);
        pointsGroup.appendChild(t);
      });
    }

    // ===== START =====
    overlaySvg.setAttribute('viewBox', '0 0 ' + imgW + ' ' + imgH);
    loadSaved();
    render();
    loadImage(1);
  </script>
</body>
</html>
